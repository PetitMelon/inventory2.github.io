name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Firebase設定をSecretsから注入
        run: |
          sed -i "s|YOUR_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g" app.js
          sed -i "s|YOUR_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" app.js
          sed -i "s|YOUR_DATABASE_URL|${{ secrets.FIREBASE_DATABASE_URL }}|g" app.js
          sed -i "s|YOUR_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g" app.js
          sed -i "s|YOUR_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" app.js
          sed -i "s|YOUR_MESSAGING_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" app.js
          sed -i "s|YOUR_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g" app.js

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
