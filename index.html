<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stocké</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-hero"><img src="hero.png" alt="stocké"></div>
      <div class="auth-sub">ログインしてください</div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="auth-email" placeholder="例：family@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="auth-password" placeholder="6文字以上" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="btn-login">ログイン</button>
      <button class="auth-btn auth-btn-sub" id="btn-go-register">新規登録はこちら</button>
      <div class="auth-note">※ ご家族のみ登録してください</div>
    </div>
  </div>

  <!-- 新規登録画面 -->
  <div id="register-screen" class="auth-screen" style="display:none">
    <div class="auth-box">
      <div class="auth-hero"><img src="hero.png" alt="stocké"></div>
      <div class="auth-title-text">新規登録</div>
      <div class="auth-sub">家族アカウントを作成します</div>
      <div id="reg-error" class="auth-error" style="display:none"></div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" placeholder="例：family@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>パスワード（6文字以上）</label>
        <input type="password" id="reg-password" placeholder="6文字以上" autocomplete="new-password">
      </div>
      <div class="field">
        <label>パスワード（確認）</label>
        <input type="password" id="reg-password2" placeholder="もう一度入力" autocomplete="new-password">
      </div>
      <button class="auth-btn" id="btn-register">登録する</button>
      <button class="auth-btn auth-btn-sub" id="btn-go-login">ログインに戻る</button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app-screen" class="app" style="display:none">
    <div class="header">
      <div class="header-brand">
        <span class="header-logo">stocké</span>
        <span class="header-paw">🐾</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="add-btn" id="btn-add">＋ 追加</button>
        <button class="logout-btn" id="btn-logout">ログアウト</button>
      </div>
    </div>
    <div class="sync-bar">
      <span class="sync-dot loading" id="sync-dot"></span>
      <span id="sync-label">接続中...</span>
      <span id="user-label" style="margin-left:auto;font-size:12px;color:#a07850"></span>
    </div>
    <div id="alert-area"></div>
    <div class="tab-row" id="tabs"></div>
    <div id="list-area"></div>
  </div>

  <!-- 追加・編集モーダル -->
  <div class="overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">商品を追加</div>
      <div class="img-preview" id="img-preview"><span id="preview-emoji">🛒</span></div>
      <label class="img-upload-label" for="img-input">写真をアップロード</label>
      <input type="file" id="img-input" accept="image/*" style="display:none">

      <div class="field"><label>商品名</label><input type="text" id="f-name" placeholder="例：トイレットペーパー"></div>
      <div class="field">
        <label>カテゴリ</label>
        <select id="f-cat">
          <option>日用品</option><option>ペット用品</option><option>食品・飲料</option>
          <option>洗剤・清掃</option><option>薬・衛生</option><option>その他</option>
        </select>
      </div>

      <!-- 値段 -->
      <div class="field">
        <label>値段（円）</label>
        <div class="price-input-row">
          <span class="price-yen">¥</span>
          <input type="number" id="f-price" min="0" step="1" placeholder="未設定">
        </div>
      </div>

      <!-- 購入URL -->
      <div class="field">
        <label>購入サイトURL（Amazon・楽天など）</label>
        <input type="url" id="f-url" placeholder="https://www.amazon.co.jp/...">
      </div>

      <!-- 管理モード -->
      <div class="field">
        <label>管理モード</label>
        <div class="mode-selector" id="mode-selector">
          <button class="mode-btn active" data-mode="count">個数管理</button>
          <button class="mode-btn" data-mode="percent">残量管理</button>
        </div>
      </div>

      <!-- 個数管理フィールド -->
      <div id="count-fields">
        <div class="field"><label>現在の在庫数</label><input type="number" id="f-stock" min="0" value="1"></div>
        <div class="field"><label>アラートの基準（この数以下で警告）</label><input type="number" id="f-threshold" min="0" value="2"></div>
        <div class="field"><label>単位（個・本・袋など）</label><input type="text" id="f-unit" placeholder="個" maxlength="6"></div>
      </div>

      <!-- 残量管理フィールド -->
      <div id="percent-fields" style="display:none">
        <div class="field">
          <label>現在の残量（%）</label>
          <div class="percent-selector" id="percent-selector">
            <button class="pct-btn active" data-pct="100">100%</button>
            <button class="pct-btn" data-pct="75">75%</button>
            <button class="pct-btn" data-pct="50">50%</button>
            <button class="pct-btn" data-pct="25">25%</button>
            <button class="pct-btn" data-pct="0">0%</button>
          </div>
        </div>
        <div class="field">
          <label>アラートの基準（この残量以下で警告）</label>
          <div class="percent-threshold-selector" id="pct-threshold-selector">
            <button class="pct-th-btn" data-th="75">75%以下</button>
            <button class="pct-th-btn active" data-th="50">50%以下</button>
            <button class="pct-th-btn" data-th="25">25%以下</button>
          </div>
        </div>
      </div>

      <!-- 自動消費設定 -->
      <div class="field auto-section" id="auto-section">
        <div class="auto-header">
          <label>自動消費設定</label>
          <label class="toggle-switch">
            <input type="checkbox" id="f-auto-enabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="auto-fields" style="display:none">
          <div class="auto-mode-row">
            <label class="radio-label">
              <input type="radio" name="auto-mode" value="manual" checked> 手動ペース設定
            </label>
            <label class="radio-label">
              <input type="radio" name="auto-mode" value="learn"> 自動学習
            </label>
          </div>
          <!-- 手動ペース -->
          <div id="manual-pace-field">
            <div class="pace-row">
              <input type="number" id="f-pace-amount" min="0.01" step="0.01" value="1" style="width:65px">
              <span id="pace-unit-label">個</span>
              <span class="pace-label">／</span>
              <select id="f-pace-period" style="width:80px;padding:6px 4px;border:1px solid var(--cream-dark);border-radius:var(--radius-md);font-size:13px;background:var(--warm-white);color:var(--brown-dark);">
                <option value="day">1日</option>
                <option value="week">1週間</option>
                <option value="month">1ヶ月</option>
              </select>
            </div>
          </div>
          <!-- 自動学習 -->
          <div id="learn-info" style="display:none">
            <div class="learn-badge">在庫変更の履歴から消費ペースを自動計算します。履歴が少ない場合は手動ペースで補完されます。</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label>アイコン</label>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-delete" id="btn-delete" style="display:none">削除</button>
        <button class="btn-save" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 削除確認 -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-msg">この商品を削除しますか？</p>
      <div class="confirm-actions">
        <button class="confirm-no" id="confirm-no">キャンセル</button>
        <button class="confirm-yes" id="confirm-yes">削除する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
