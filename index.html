<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stocké</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-hero"><img src="hero.png" alt="stocké"></div>
      <div class="auth-sub">ログインしてください</div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
      <div class="field"><label>メールアドレス</label><input type="email" id="auth-email" placeholder="例：family@example.com" autocomplete="email"></div>
      <div class="field"><label>パスワード</label><input type="password" id="auth-password" placeholder="6文字以上" autocomplete="current-password"></div>
      <button class="auth-btn" id="btn-login">ログイン</button>
      <button class="auth-btn auth-btn-sub" id="btn-go-register">新規登録はこちら</button>
      <div class="auth-note">※ ご家族のみ登録してください</div>
    </div>
  </div>

  <!-- 新規登録画面 -->
  <div id="register-screen" class="auth-screen" style="display:none">
    <div class="auth-box">
      <div class="auth-hero"><img src="hero.png" alt="stocké"></div>
      <div class="auth-title-text">新規登録</div>
      <div class="auth-sub">家族アカウントを作成します</div>
      <div id="reg-error" class="auth-error" style="display:none"></div>
      <div class="field"><label>メールアドレス</label><input type="email" id="reg-email" placeholder="例：family@example.com" autocomplete="email"></div>
      <div class="field"><label>パスワード（6文字以上）</label><input type="password" id="reg-password" placeholder="6文字以上" autocomplete="new-password"></div>
      <div class="field"><label>パスワード（確認）</label><input type="password" id="reg-password2" placeholder="もう一度入力" autocomplete="new-password"></div>
      <button class="auth-btn" id="btn-register">登録する</button>
      <button class="auth-btn auth-btn-sub" id="btn-go-login">ログインに戻る</button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app-screen" style="display:none">

    <!-- ナビゲーションバー -->
    <nav class="nav-bar">
      <div class="nav-brand">
        <span class="header-logo">stocké</span>
        <span class="header-paw">🐾</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-page="inventory">在庫</button>
        <button class="nav-tab" data-page="history">履歴・家計</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="add-btn" id="btn-add">＋ 追加</button>
        <button class="logout-btn" id="btn-logout">ログアウト</button>
      </div>
    </nav>

    <!-- 在庫ページ -->
    <div id="page-inventory" class="page app">
      <div class="sync-bar">
        <span class="sync-dot loading" id="sync-dot"></span>
        <span id="sync-label">接続中...</span>
        <span id="user-label" style="margin-left:auto;font-size:12px;color:#a07850"></span>
      </div>
      <div id="alert-area"></div>
      <div class="tab-row" id="tabs"></div>
      <div id="list-area"></div>
    </div>

    <!-- 履歴・家計ページ -->
    <div id="page-history" class="page app" style="display:none">
      <div class="history-header">
        <div class="history-title">消費履歴・家計</div>
        <div class="month-nav">
          <button class="month-btn" id="btn-month-prev">‹</button>
          <span id="month-label"></span>
          <button class="month-btn" id="btn-month-next">›</button>
        </div>
      </div>

      <!-- サマリーカード -->
      <div class="summary-cards" id="summary-cards"></div>

      <!-- 月別棒グラフ -->
      <div class="chart-section">
        <div class="chart-title">過去3ヶ月の消費金額</div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>

      <!-- カテゴリ別内訳 -->
      <div class="chart-section">
        <div class="chart-title">カテゴリ別内訳</div>
        <div id="category-breakdown"></div>
      </div>

      <!-- 詳細履歴リスト -->
      <div class="chart-section">
        <div class="chart-title">消費履歴一覧</div>
        <div id="history-list"></div>
      </div>
    </div>

  </div>

  <!-- 追加・編集モーダル -->
  <div class="overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">商品を追加</div>
      <div class="img-preview" id="img-preview"><span id="preview-emoji">🛒</span></div>
      <label class="img-upload-label" for="img-input">写真をアップロード</label>
      <input type="file" id="img-input" accept="image/*" style="display:none">

      <div class="field"><label>商品名</label><input type="text" id="f-name" placeholder="例：トイレットペーパー"></div>
      <div class="field">
        <label>カテゴリ</label>
        <select id="f-cat">
          <option>日用品</option><option>ペット用品</option><option>食品・飲料</option>
          <option>洗剤・清掃</option><option>薬・衛生</option><option>その他</option>
        </select>
      </div>

      <!-- 値段 -->
      <div class="field">
        <label>値段（円）</label>
        <div class="price-input-wrap">
          <span class="price-prefix">¥</span>
          <input type="number" id="f-price" min="0" step="1" placeholder="0">
          <span class="price-suffix">/ <input type="text" id="f-price-unit" placeholder="個" maxlength="6" style="width:48px;border:none;border-bottom:1px solid var(--cream-dark);background:transparent;font-size:14px;color:var(--brown-dark);padding:2px 4px;"></span>
        </div>
      </div>

      <!-- 管理モード -->
      <div class="field">
        <label>管理モード</label>
        <div class="mode-selector" id="mode-selector">
          <button class="mode-btn active" data-mode="count">個数管理</button>
          <button class="mode-btn" data-mode="percent">残量管理（大容量）</button>
        </div>
      </div>

      <!-- 個数管理フィールド -->
      <div id="count-fields">
        <div class="field"><label>現在の在庫数</label><input type="number" id="f-stock" min="0" value="1"></div>
        <div class="field"><label>アラートの基準（この数以下で警告）</label><input type="number" id="f-threshold" min="0" value="2"></div>
        <div class="field"><label>単位（個・本・袋など）</label><input type="text" id="f-unit" placeholder="個" maxlength="6"></div>
      </div>

      <!-- 残量管理フィールド -->
      <div id="percent-fields" style="display:none">
        <div class="field">
          <label>現在の残量</label>
          <div class="percent-selector" id="percent-selector">
            <button class="pct-btn active" data-pct="100">満タン</button>
            <button class="pct-btn" data-pct="75">75%</button>
            <button class="pct-btn" data-pct="50">半分</button>
            <button class="pct-btn" data-pct="25">残り少し</button>
            <button class="pct-btn" data-pct="0">空</button>
          </div>
        </div>
        <div class="field"><label>アラートの基準（この%以下で警告）</label>
          <select id="f-pct-threshold">
            <option value="25">25%以下</option>
            <option value="50">50%以下</option>
          </select>
        </div>
      </div>

      <!-- 自動消費設定 -->
      <div class="field auto-section" id="auto-section">
        <div class="auto-header">
          <label>自動消費設定</label>
          <label class="toggle-switch">
            <input type="checkbox" id="f-auto-enabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="auto-fields" style="display:none">
          <div class="auto-mode-row">
            <label class="radio-label"><input type="radio" name="auto-mode" value="manual" checked> 手動ペース設定</label>
            <label class="radio-label"><input type="radio" name="auto-mode" value="learn"> 自動学習</label>
          </div>
          <div id="manual-pace-field">
            <div class="pace-row">
              <span class="pace-label">1日あたり</span>
              <input type="number" id="f-pace-amount" min="0.01" step="0.01" value="1" style="width:70px">
              <span id="pace-unit-label">個</span>
              <span class="pace-label">消費</span>
            </div>
          </div>
          <div id="learn-info" style="display:none">
            <div class="learn-badge">在庫変更の履歴から消費ペースを自動計算します。</div>
          </div>
        </div>
      </div>

      <div class="field"><label>アイコン</label><div class="emoji-grid" id="emoji-grid"></div></div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-delete" id="btn-delete" style="display:none">削除</button>
        <button class="btn-save" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 削除確認 -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-msg">この商品を削除しますか？</p>
      <div class="confirm-actions">
        <button class="confirm-no" id="confirm-no">キャンセル</button>
        <button class="confirm-yes" id="confirm-yes">削除する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
